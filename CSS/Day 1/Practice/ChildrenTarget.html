<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Children-Target</title>
    <style>
        ul h1:first-child{
            color: red;
        }
        ul li:last-child{
            color: blue;
        }
        ul li:nth-child(3){
            color: green;
        }
        ul li:first-of-type {
            color: aqua;
        }
        ul h1:last-of-type {
            color: blueviolet;
        }
        ul li:nth-of-type(4) {
            color: aliceblue;
        }
        ul li:nth-last-of-type(2) {
            color: chartreuse;
        }


    </style>
</head>
<body>
    <ul>
        <h1>List of Bikes</h1>
        <li>Royal Enfield</li>
        <li>Lord Splender</li>
        <li>KTM</li>
        <li>R15</li>
        <li>Ninja</li>
        <li>Harley Davidson</li>
        <li>Hyusong</li>
        <li>Ducati</li>

        <h1>List of Cars</h1>
        <li>Audi</li>
        <li>Aulto</li>
        <li>Skoda</li>
        <li>Volkswagen</li>
    </ul>
</body>
</html>
