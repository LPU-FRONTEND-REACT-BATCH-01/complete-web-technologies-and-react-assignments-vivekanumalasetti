<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline-css Practice</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        p {
            color: burlywood;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-weight: lighter;
            background-color: chocolate;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 style="color: black; background-color: yellowgreen; text-align: center; padding: 10px; font-family:Verdana, Geneva, Tahoma, sans-serif; font-size: 24px;">This is styled by Inline CSS</h1>
    <p>This is styled by Internal CSS</p>
    <h2>This is styled by External CSS file</h2>
</body>
</html>
