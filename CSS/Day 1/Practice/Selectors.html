<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling the selectors</title>
    <style>
        #fruits{
            color: rgb(0, 0, 0);
            background-color: bisque;
            text-align: center;
            font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;

        }

        .fruits{
            color: rgb(84, 138, 153);
            background-color: rgb(255, 255, 255);
            font-family: 'Times New Roman', Times, serif;
        }

        .fav{
            color: rgb(255, 0, 183);
            background-color: rgb(255, 255, 255);
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <list>
        <ul>
            <h1 id="fruits">Fruits</h1>
            <li class="fruits">Apple</li>
            <li class="fruits">Mango</li>
            <li class="fruits">Banana</li>
            <li class="fruits">Grapes</li>
            <li class="fruits">Orange</li>
            <li class="fruits">Pineapple</li>
            <li class="fruits fav">Watermelon</li>
            <li class="fruits">Strawberry</li>
            <li class="fruits">Kiwi</li>
        </ul>
    </list>
</body>
</html>
