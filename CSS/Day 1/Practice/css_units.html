<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css-unit</title>
    <style>
        html{
            font-size: 10px;
        }

        .parent {
            width: 80%;
            height: 40%;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            font-size: 1rem;
            background-color: aqua;
            margin-left: 10%;
            margin-right: 10%;
        } 

        .child1{
            font-family:'Courier New', Courier, monospace;
            font-size: 2em;
            text-align: center;
        }

        .child2{
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 2em;
            text-align: center;
        }

        .child3{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 2em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="parent">
        <p class="child1">The is First line</p>
        <p class="child2">The is Second line</p>
        <p class="child3">The is Thrid line</p>
    </div>
</body>
</html>
