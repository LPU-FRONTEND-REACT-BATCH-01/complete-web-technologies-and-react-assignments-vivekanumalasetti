<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link {
            color: slategray;
        }
        a:visited {
            color: lightcoral;
        }
        a:hover {
            color: lightseagreen;
        }
        a:active {
            color: rgb(0, 0, 0);
        }
        input:focus {
            background-color: lightblue;
        }
        h1:hover::before {
            content: "I ";
            color:rgb(128, 255, 2);
        }
        h1:hover::after {
            content: " DNS";
            color: rgb(0, 94, 255);
        }
    </style>
</head>
<body>
    <a href="https://www.amazon.com/">Click.Here</a><br><br>
    <input type="text"><br><br>
    <h1>AM</h1>
</body>
</html>
