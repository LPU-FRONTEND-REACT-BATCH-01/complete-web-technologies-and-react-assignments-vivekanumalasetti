<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row and Column Span 2</title>
</head>
<body>
    <table border="2">
        <tr>
            <td rowspan="3" align="center">Day</td>
            <td colspan="3" align="center">Seminar</td>
        </tr>
        <tr>
            <td colspan="2" align="center">Schedule</td>
            <td rowspan="2" align="center">Topic</td>
        </tr>
        <tr>
            <td>Begin</td>
            <td>End</td>
        </tr>
        <tr>
            <td rowspan="2">Monday</td>
            <td rowspan="2">8:00 am</td>
            <td rowspan="2">5:00 pm</td>
            <td>Introduction to XML</td>
        </tr>
        <tr>
            <td>Validaty DTD and Relax NG</td>
        </tr>
        <tr>
            <td rowspan="3">Tuesday</td>
            <td>8:00 am</td>
            <td>5:00 pm</td>
            <td rowspan="2" align="center">XFath</td>
        </tr>
        <tr>
            <td>11:00 am</td>
            <td>2:00 pm</td>
        </tr>
        <tr>
            <td>2:00 pm</td>
            <td>5:00 pm</td>
            <td>XML Transformations</td>
        </tr>
        <tr>
            <td>Wednesday</td>
            <td>8:00 am</td>
            <td>12:00 pm</td>
            <td>XML Formatting Objects</td>
        </tr>
    </table>
</body>
</html>
